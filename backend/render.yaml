services:
  - type: web
    name: dloa-pages-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build && npx prisma generate
    startCommand: npm run start:migrate
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: CORS_ORIGIN
        sync: false          # set to your Vercel frontend URL after deploy
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: NODE_ENV
        value: production
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 1
